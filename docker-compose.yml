services:
  # ---------------------------------------------------------------------------
  # 1. Frontend (Vite + React served by Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag_net

  # ---------------------------------------------------------------------------
  # 2. Backend (FastAPI + FlagEmbedding Model locally cached)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8089:8000"
    env_file:
      - path: ./.env
        required: false
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chroma:8000
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      # Cache HuggingFace models so they aren't re-downloaded every restart
      - hf_cache:/app/cache
      # Persist SQLite database and other app-level data
      - app_data:/app/data
    restart: unless-stopped
    networks:
      - rag_net

  # ---------------------------------------------------------------------------
  # 3. Redis (Pub/Sub for streaming events)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    command: redis-server --save "" --loglevel warning --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - rag_net

  # ---------------------------------------------------------------------------
  # 4. ChromaDB (Vector Database)
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    restart: unless-stopped
    networks:
      - rag_net

volumes:
  redis_data:
  chroma_data:
  hf_cache:
  app_data:


networks:
  rag_net:
    driver: bridge
